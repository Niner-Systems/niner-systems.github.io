# ----
# Site

title: 9er Systems
url: "https://9erSystems.com"
baseurl: ""
ordernowurl: "/#notifyme" #"https://amazon.com/"
google_analytics_key: "G-H9H1DLX2S9"
disqus_shortname:

# Values for the jekyll-seo-tag gem (https://github.com/jekyll/jekyll-seo-tag)
logo: /images/logo-aviation-audio-horizontal-white.svg
description: An Aviation Audio Company — aviation headset to USB adapters (USB2GA, USB2Lemo) and the free USB2x Toolbar app for sidetone and VOX on Mac and Windows.
author:
  name: 9er Systems
  email: info@9ersystems.com
  twitter: # twitter username without the @ symbol
social:
  name: 9er Systems
  links:
    - https://9ersystems.com

# -----
# Build

timezone: US/Eastern

collections:
  staff_members:
    _hide_content: true

paginate: 10
paginate_path: "/blog/:num/"
permalink: pretty

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      _options:
        content:
          width: 1500
          height: 2500
  - scope:
      path: ""
      type: "staff_members"
    values:
      _options:
        image_path:
          width: 600
          height: 600
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: "index.html"
    values:
      layout: "default"
  - scope:
      path: "contact.html"
    values:
      full_width: true

jekyll-archives:
  enabled:
    - categories

plugins:
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate

include:
  - .well-known

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE

# -----------
# CloudCannon

_select_data:
  social_icons:
    - Facebook
    - Instagram
    - LinkedIn
    - Pinterest
    - Tumblr
    - Twitter
    - YouTube
    - RSS

_comments:
  map: Update the map location and display settings.
  latitude: Coordinates for the center marker on the map.
  longitude: Coordinates for the center marker on the map.
  zoom: The zoom level for the map.
  pricing_table: Update the information in the pricing tables.
  highlight: Emphasis the text
  color: The background colour used in the plan name and call to action.
  new_window: Open link in new window
